"$schema" = 'https://starshp.rs/config-schema.json'

format = """
[┌───────────────────>](bold green)
[│](bold green)$username\
$hostname\
$kubernetes\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$fill\
$memory_usage\
$env_var\
$sudo\
$cmd_duration\
$jobs\
$status\
$container\
$shell\
(\n[│](bold green)$package\
$cpp\
$cmake\
$dart\
$golang\
$java\
$kotlin\
$gradle\
$lua\
$nodejs\
$opa\
$python\
$ruby\
$rust\
$swift\
$conda)
[└─>](bold green)$character"""

add_newline = true

[directory]
truncation_length = 4
truncation_symbol = '…/'
[directory.substitutions]
'~/Download/' = ' '

[fill]
symbol = " "

[aws]
symbol = " "

[cpp]
detect_files = ['main.cpp']
symbol = "󰙲 "

[dart]
symbol = " "

[golang]
symbol = " "

[gradle]
symbol = " "

[kotlin]
symbol = " "

[python]
symbol = " "

[shell]
disabled = false

[status]
disabled = false

[sudo]
disabled = false

[username]
show_always = true

[memory_usage]
disabled = false
