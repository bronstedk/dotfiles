version = 3
final_space = true

[palette]
blue = '#89B4FA'
closer = 'p:os'
lavender = '#B4BEFE'
os = '#ACB0BE'
pink = '#F5C2E7'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
template = '{{.Icon}} '
foreground = 'p:os'
type = 'os'
style = 'plain'

[[blocks.segments]]
template = '{{ .UserName }} '
foreground = 'p:blue'
type = 'session'
style = 'plain'

[[blocks.segments]]
template = '{{ .Path }} '
foreground = 'p:pink'
type = 'path'
style = 'plain'

[blocks.segments.properties]
home_icon = '~'
style = 'full'

[[blocks.segments]]
template = '{{ .HEAD }} '
foreground = 'p:lavender'
type = 'git'
style = 'plain'

[blocks.segments.properties]
branch_icon = ' '
cherry_pick_icon = ' '
commit_icon = ' '
fetch_status = false
fetch_upstream_icon = false
merge_icon = ' '
no_commits_icon = ' '
rebase_icon = ' '
revert_icon = ' '
tag_icon = ' '

[[blocks.segments]]
type = 'jujutsu'
style = 'plain'
foreground = 'p:pink'

[[blocks]]
type = 'rprompt'
overflow = 'hidden'

[[blocks.segments]]
type = 'executiontime'
style = 'plain'
foreground = 'p:lavender'
template = '{{ .FormattedMs }}'

[blocks.segments.properties]
style = 'roundrock'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
template = ''
foreground = 'p:closer'
type = 'text'
style = 'plain'

[transient_prompt]
template = ' '
foreground = 'p:closer'
background = 'transparent'

[secondary_prompt]
template = ' '
foreground = 'p:closer'
